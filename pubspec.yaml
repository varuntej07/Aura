name: aura
description: "Aura - Voice-first personal AI companion"
publish_to: 'none'

version: 2.2.0+11

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons:
  provider: 
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_analytics:
  firebase_crashlytics:
  firebase_messaging:
  flutter_local_notifications: 21.0.0
  google_sign_in: ^7.2.0
  http:
  connectivity_plus:
  flutter_markdown_plus:
  url_launcher:
  uuid:
  intl:
  shared_preferences:
  flutter_timezone:
  livekit_client: ^2.5.4  # >=2.5.4 required for PreConnectAudioBuffer
  image_picker:
  file_picker: 11.0.0
  flutter_image_compress:
  permission_handler:
  drift:
  drift_flutter:
  sqlite3_flutter_libs:
  go_router:
  posthog_flutter:
  wakelock_plus:
  package_info_plus: 9.0.1  # runtime app version/build for feedback docs
  app_links:  # aura://voice deep link (Voice Launcher: Siri / widgets / external links)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  drift_dev:
  build_runner:
  mocktail:
  mockito:
  flutter_launcher_icons:

# Pinned 2026-06-17: livekit_client 2.8.0 / device_info_plus 12.4.0 /
# shared_preferences_android 2.4.26 silently drop their FlutterPlugin entry class from
# the RELEASE-variant Kotlin compile under this project's toolchain, breaking the release
# AAB build (app javac "cannot find symbol"). Held one patch/minor below the broken
# versions (these build cleanly). Remove these overrides if the Kotlin toolchain in
# android/build.gradle.kts is later modernized to support the newer plugin releases.
dependency_overrides:
  livekit_client: 2.7.0
  device_info_plus: 12.3.0
  shared_preferences_android: 2.4.25
  # 1.4.1 ships the UTF-8 device-name sanitize fix (flutter-webrtc#2021); 1.4.0
  # crashes getUserMedia on non-ASCII device names. Remove once livekit_client
  # resolves >=1.4.1 on its own.
  flutter_webrtc: 1.4.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/Aura-Icon.png"
  # Aura-Icon.png is a transparent "a". iOS forbids alpha (renders it black),
  # so flatten onto white; Android adaptive icon gets white behind the foreground.
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/Aura-Icon.png"
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  web:
    generate: true
    image_path: "assets/icons/Aura-Icon.png"
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"
  macos:
    generate: true
    image_path: "assets/icons/Aura-Icon.png"

flutter:
  uses-material-design: true

  shaders:
    - shaders/voice_sphere.frag

  assets:
    # Drop your "Hey Buddy" .ppn file here from Picovoice Console.
    # Placeholder: using built-in keyword until custom model is added.
    - assets/wake_word/
    - assets/icons/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Light.ttf
          weight: 300
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
