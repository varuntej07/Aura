name: aura
description: "Aura - Voice-first personal AI assistant"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons:
  provider: 
  firebase_core:
  firebase_auth:
  cloud_firestore:
  firebase_analytics:
  firebase_crashlytics:
  firebase_messaging:
  flutter_local_notifications:
  google_sign_in:
  http:
  connectivity_plus:
  flutter_markdown_plus:
  url_launcher:
  uuid:
  intl:
  shared_preferences:
  flutter_timezone:
  livekit_client:
  image_picker:
  file_picker:
  flutter_image_compress:
  permission_handler:
  drift:
  drift_flutter:
  sqlite3_flutter_libs:
  go_router:
  in_app_purchase:
  posthog_flutter:

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints:
  drift_dev:
  build_runner:
  mocktail:
  flutter_launcher_icons:

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/fire_aura.png"
  adaptive_icon_background: "#000000"
  adaptive_icon_foreground: "assets/icons/fire_aura.png"
  web:
    generate: true
    image_path: "assets/icons/fire_aura.png"
  windows:
    generate: true
    image_path: "assets/icons/fire_aura.png"
  macos:
    generate: true
    image_path: "assets/icons/fire_aura.png"

flutter:
  uses-material-design: true

  assets:
    # Drop your "Hey Buddy" .ppn file here from Picovoice Console.
    # Placeholder: using built-in keyword until custom model is added.
    - assets/wake_word/
    - assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/PlusJakartaSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/PlusJakartaSans-SemiBold.ttf
          weight: 600
    - family: GeistMono
      fonts:
        - asset: assets/fonts/GeistMono-Regular.ttf
          weight: 400
        - asset: assets/fonts/GeistMono-Medium.ttf
          weight: 500
    - family: CormorantGaramond
      fonts:
        - asset: assets/fonts/CormorantGaramond-Light.ttf
          weight: 300
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
          weight: 400
